services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: tacitiq-postgres
    environment:
      POSTGRES_DB: tacitiq
      POSTGRES_USER: root
      POSTGRES_PASSWORD: secretpassword
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U root -d tacitiq"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - tacitiq-network

  neo4j:
    image: neo4j:5.12-community
    container_name: tacitiq-neo4j
    stop_grace_period: 2m
    environment:
      NEO4J_AUTH: neo4j/secretgraphpassword
      NEO4J_PLUGINS: '["apoc"]'
      NEO4J_dbms_security_procedures_unrestricted: 'apoc.*'
      NEO4J_dbms_security_procedures_allowlist: 'apoc.*'
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - neo4j_data:/data
    tmpfs:
      - /var/lib/neo4j/run
    healthcheck:
      test: ["CMD", "cypher-shell", "-u", "neo4j", "-p", "secretgraphpassword", "RETURN 1"]
      interval: 10s
      timeout: 20s
      retries: 10
      start_period: 30s
    networks:
      - tacitiq-network

  redis:
    image: redis:7-alpine
    container_name: tacitiq-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - tacitiq-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: tacitiq-backend
    ports:
      - "8080:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=dev
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/tacitiq
      - SPRING_DATASOURCE_USERNAME=root
      - SPRING_DATASOURCE_PASSWORD=secretpassword
      - SPRING_NEO4J_URI=bolt://neo4j:7687
      - SPRING_NEO4J_AUTHENTICATION_USERNAME=neo4j
      - SPRING_NEO4J_AUTHENTICATION_PASSWORD=secretgraphpassword
      - SPRING_DATA_REDIS_HOST=redis
      - SPRING_DATA_REDIS_PORT=6379
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID:-}
    depends_on:
      postgres:
        condition: service_healthy
      neo4j:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - tacitiq-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - VITE_GOOGLE_CLIENT_ID=${VITE_GOOGLE_CLIENT_ID:-}
    container_name: tacitiq-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    networks:
      - tacitiq-network

volumes:
  postgres_data:
  neo4j_data:
  redis_data:

networks:
  tacitiq-network:
    driver: bridge
