spring:
  autoconfigure:
    exclude:
      - org.springframework.ai.autoconfigure.vectorstore.pgvector.PgVectorStoreAutoConfiguration

  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;MODE=PostgreSQL;INIT=CREATE DOMAIN IF NOT EXISTS vector AS REAL ARRAY\;CREATE DOMAIN IF NOT EXISTS JSONB AS VARCHAR
    driver-class-name: org.h2.Driver
    username: sa
    password:

  flyway:
    enabled: false

  jpa:
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect

  neo4j:
    uri: bolt://localhost:7687
    authentication:
      username: neo4j
      password: secretgraphpassword

  data:
    redis:
      repositories:
        enabled: false

  cache:
    type: none

  ai:
    vertex:
      ai:
        gemini:
          api-key: dummy
          project-id: dummy
          location: dummy